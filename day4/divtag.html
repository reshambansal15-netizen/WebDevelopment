<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- Div - It is Block Level Tag / 100% width of the space -->
    <div style=" background-color: aqua;">
        <h2>Menu</h2>
        <ol>
            <li>Pizza</li>
            <li>Coke</li>
            
        </ol>
    </div>
    <div style="background-color: bisque;">
        <h2>Review</h2>
        <strong>Good restraunt</strong>
        <p>_Sarah⭐⭐⭐⭐⭐</p>
    </div>

    <!-- Span Tag - Takes only required amount width / Inline tag 
     span tag can be added inside any other html tag-->

     <span style="background-color: brown;">Login</span>
     <button>Cart <span>0</span></button>
</body>
</html>
