<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        //Conditional

        //1. if(condition): If will only gives output when condition is True

        let age = 22

        if(age>=18){
            //Body of if
            console.log("Eligible")

            alert("Eligible for driving")
        }

        //2. if - else
        // if - True and else - False

        

        if(age>=18){
            //Body of if
            console.log("Eligible")

            alert("Eligible for driving")
        }else{

            alert("Not Eligible - Age should be 18 or above")

        }

        //else if - Multiple Condition
        //Delivery Charges - amount is greatre or equal to 500 - Free
        // amount between 400-499 - 30Rs Delivery Charge
        // amount between 300 - 399 - 50 Delivery
        // Cannot place! Min Cart Value - 300

        let amount 

        if(amount>= 500){

            alert("FREE DELIVERY")

        }
        else if(amount>=400){

            alert("Rs 30 Delivery Charges")
        }
        else if(amount>=300){

            alert("Rs 50 Delivery Charges")

        }
        else{

            alert("Cannot place! Min Cart Value - 300")
        }

        


    </script>
</body>
</html>
