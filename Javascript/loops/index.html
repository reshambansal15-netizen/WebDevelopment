<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        //Task - Print Numbers 1 to 100 in console

        console.log(1)
        console.log(2)
        console.log(3)
        console.log(4)
        // ...

        //for loop
        //for (starting point;ending/Condition point; Incereement = ++/Decreement = --)  - keyword
        
        //Task print 1 to 10
        for(let i = 1; i<=10; i++){
            //Repeated Task
            console.log("The value of i: " + i)
        }

        // while loop - Entry Controlled loop

        // while(Condition) - When condition is True loops start and when condition become False Loop Stopped

        let count = 1

        while(count<=5){
            console.log("Hi! I'm a while loop")
            count++
        }

        // Do while looop = Exit Controlled loop
        // It will execute / run the code atleast 1 time - even toh condition is false

        let number = 6

        do{
            console.log("Hello! How are you?")
        }while(number<5)
    </script>
</body>
</html>
