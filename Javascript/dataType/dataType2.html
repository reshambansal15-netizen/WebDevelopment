<!DOCTYPE html>
<html lang="en">
<head>

<body>
    <script>
        // Array - It is used to Sore Multiple Data/Value at the same time
        //Advantage in Js Array - Can of different Data Types together
        //Symbol - [ ] Square Bracket

        //Rule : Index no. starts with 0

        let students = ["Abhinav", "Vaishnavi", "Piyush", "Rohini", "Aayushi" ]
        console.log(students)

        //Acess a Single Dta from Array
        // Arraynmae[index no.]

        console.log(students[4])

        //Products 
        let products = [ "Mobile" , "Laptop" , "Tv" , "Fridge" , "Washing Machine" ]
        console.log(products)


         //Object - It is used To Store Multiple Data/Value At the Same Time
        // Collection of Data
        //Format : key(Left):value(Right) Pair
        // Symbol - { Curly Bracket }

        let employe1 = {

            //key:value
            name:"Aditya" ,
            email:"Aditya@gmail.com" ,
            id:1234 ,
            salary:60000

        }

        //How To ACess The Value in Ibject : objectName.keyName
        console.log(employe1.email)

    </script>
    
</body>
