<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Data Types in Javascript</h1>

    <script>
        // Data type - Types of Data
        // 1. String = Text - "Anything inside double or single quotes" or ''.
        
        var username = "John"
        console.log(username)
        // Check the type of any value - typeof(VariableName)

        console.log(typeof(username))

        //2. Number: +ve, -ve, decimal number - Every number is a number

        var age = 34

        console.log(typeof(age))

        //3. Boolean - when the value is in true or false
        var isSubscribe = false
        console.log(typeof(isSubscribe))

        var isLoggedIn = true
        console.log(typeof(isLoggedIn))

        //4. Undefined - When no value is assigned

        var a 
        console.log(typeof(a))

        //5. Null - nothing
        var b = null  // Due to early bug in Js 
                      // Data type of null its shows Object
        console.log(typeof(null))

        
    </script>
</body>
</html>
