<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        // Variable - It is used to store the data
        // Trick - "Text Format Data"
        // Number Format Data Write Directly

        // Keyword - var
        // Syntax VariableType VariableName = Value
        
        var username = "Resham"
        console.log(username)

        var age = 18
        console.log(age)

        //Disadvantage of var keyword

        var phone = 1234567890

        var phone = 8967
        console.log(phone)

        // 2. Keyword - let
        
        let email ="abc@gmail.com"
    

       // let email = "dhi@gmail.com" - Throw error bcz using same variable that is email along with let
        
       console.log(email)

       //Disadvantage - If you use the same variableName without using let keyword it will update the value


       let review = 4.5

       review = 2.3
       console.log(review)
       
       // 3. Keyword - const means constant - fixed

       const abc = "Hello Guys"
       
       // abc = "Good Morning" - it will raise an error - No Update

       console.log(abc)


    </script>
</body>
</html>
