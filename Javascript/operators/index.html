<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        //Arthimetic Operators - + , - , / , * , %

        var x = 10
        var y = 7

        console.log(x+y)
        console.log(x-y)
        console.log(x/y)
        console.log(x*y)
        console.log(x%y)

        //Modulo - Remainder

        console.log(10%5)   //Reaminder  - 0

        console.log(12%5)  //Remainder - 2

        //Left Number is Smaller Than Right Number in Modulo output- LEFT Number
        console.log(2%9)   //  2

        console.log(1%8) //  1
    </script>
</body>
</html>
