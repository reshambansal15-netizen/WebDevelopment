<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        // AND - && - If both condition is true then output True

        var isMember = true
        let TotalPrice = 300

        console.log(isMember && TotalPrice > 500)

        // OR - || If Only one condition is True then output is True

        console.log(isMember || TotalPrice > 500)

        // Negation - ! : Opposite Value

        let NetFlixSub = false

        console.log(!NetFlixSub)

        // Comparison - Two Value

        const a = 10
        const b ="10"
        
        //== Compare Value - Both Value are same Output is True

        console.log(a == b) // True

        //=== Compare Value and Data Types - Both are same output is True
        console.log(a===b)  //False

    </script>
</body>
</html>
