<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
.product{
     display: flex;
     justify-content: center;
     gap: 30px;
     align-items: center;

    height: 400px; 
    background-color: #f2f2f2;
    border: 1px solid black;
}

.box{
    border: 1px solid black;
    width: 100px;
    height: 100px;
    padding: 10px;
    text-align: center;
    font-weight: bold;
    font-style: italic;
    background-color: beige;
}
    </style>
</head>
<body>
    <!-- Flex Gives Display in 1 Dimwensional  - Either Row or Column -->
     <div class="product">
        <div class="box">Cake</div>
        <div class="box">Cookie</div>
        <div class="box">Pastry</div>
     </div>
</body>
</html>
