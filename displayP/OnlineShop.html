<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            font-family: cursive;
            background-color: #f8f8f8;
            margin: 0;
        }

        .parent{
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
            padding: 10px;
        }

        .product{
            border: 1px solid black;
            overflow: hidden;
            text-align: center;
            border-radius: 12px;
           box-shadow: 0 2px 6px black;
           padding-bottom: 15px;
            background-color: white;
            color: red;
            transition: 1s ease;
        }

        .product img{
            border-radius: 12px;
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .product button{
            background-color: #28a745;
            border: none;
            color: white;
            padding: 10px;
            border-radius: 12px;
            cursor: pointer;
        }

        .product:hover{
            transform: scale(1.02);
        }
    </style>
</head>
<body>
    <div class="parent">
       
          <div class="product">
            <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=1200&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8Mnx8aGVhZHBob25lc3xlbnwwfHwwfHx8MA%3D%3D">
            <h2>Headphone</h2>
            <p><del>$100</del> <mark>$70.99</mark>  </p>
            <button>Add To Cart</button>
          </div>

           <div class="product">
            <img src="https://images.unsplash.com/photo-1718220095476-7916e897fc55?w=1200&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MTl8fGFkaWRhcyUyMHNob2VzfGVufDB8fDB8fHww">
            <h2>Shoes</h2>
            <p><del>$50</del> <mark>$20.99</mark> </p>
            <button>Add To Cart</button>
          </div>

           <div class="product">
            <img src="https://images.unsplash.com/photo-1625708458528-802ec79b1ed8?w=1200&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8NHx8d2F0ZXIlMjBib3R0bGV8ZW58MHx8MHx8fDA%3D">
            <h2>Water Bottle</h2>
            <p><del>$10</del> <mark>$5.99</mark> </p>
            <button>Add To Cart</button>
          </div>


           <div class="product">
            <img src="https://images.unsplash.com/photo-1620799140408-edc6dcb6d633?w=1200&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MTB8fGNsb3RoZXN8ZW58MHx8MHx8fDA%3D">
            <h2>Shirt</h2>
            <p><del>$15</del> <mark>$7.99</mark> </p>
            <button>Add To Cart</button>
          </div>

           <div class="product">
            <img src="https://images.unsplash.com/photo-1599623560574-39d485900c95?w=1200&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8NHx8dG95c3xlbnwwfHwwfHx8MA%3D%3D">
            <h2>Toys</h2>
            <p><del>$20</del> <mark>10.99</mark> </p>
            <button>Add To Cart</button>
          </div>


           <div class="product">
            <img src="https://images.unsplash.com/photo-1519682337058-a94d519337bc?w=1200&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MTF8fEJvb2tzfGVufDB8fDB8fHww">
            <h2>Books</h2>
            <p><del>$25</del> <mark>$15.99</mark> </p>
            <button>Add To Cart</button>
          </div>





    </div>
</body>
</html>
